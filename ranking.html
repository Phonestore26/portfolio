<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Store | Ultra Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #FFD700;
            --primary-glow: rgba(255, 215, 0, 0.3);
            --bg: #050505;
            --card: rgba(20, 20, 25, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --up: #00ff88;
            --down: #ff3b30;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top right, #0a0a15, #050505);
            color: white;
            min-height: 100vh;
        }

        .header {
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header h2 {
            margin: 0;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header h2 span { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }

        .btn-back {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 12px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-back:hover { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary-glow); }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }

        /* Grid de Indicadores Reais */
        .top-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        .glass-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 12px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Funil Moderno CSS */
        .funnel-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .funnel-step {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: black;
            font-size: 12px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-1 { width: 100%; background: #FFD700; clip-path: polygon(0% 0%, 100% 0%, 95% 100%, 5% 100%); }
        .step-2 { width: 85%; background: #E6C200; clip-path: polygon(0% 0%, 100% 0%, 95% 100%, 5% 100%); }
        .step-3 { width: 70%; background: #CCAC00; clip-path: polygon(0% 0%, 100% 0%, 95% 100%, 5% 100%); }
        .step-4 { width: 55%; background: #B39700; clip-path: polygon(0% 0%, 100% 0%, 40% 100%, 60% 100%); }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            background: var(--card);
            padding: 15px 30px;
            border-radius: 100px;
            border: 1px solid var(--border);
            margin-bottom: 35px;
            align-items: center;
        }

        .cat-group { display: flex; gap: 10px; }
        .cat-btn {
            background: #151515;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.3s;
            color: #aaa;
        }

        .cat-btn:hover { color: white; border-color: var(--primary); }
        .cat-btn.active { background: var(--primary); color: black; }

        .search-input {
            background: #000;
            border: 1px solid #333;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            width: 250px;
            outline: none;
            font-family: inherit;
        }

        .ranking-container { display: flex; flex-direction: column; gap: 12px; }
        
        .rank-item {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 18px 25px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .rank-item:hover { transform: translateX(10px); background: rgba(255,255,255,0.03); border-color: var(--primary); }

        .pos-badge {
            width: 45px;
            font-size: 20px;
            font-weight: 900;
            color: var(--primary);
        }

        .vendedor-info { flex-grow: 1; }
        .vendedor-name { font-weight: 700; font-size: 14px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }

        .trend-up { color: var(--up); font-size: 10px; background: rgba(0, 255, 136, 0.1); padding: 2px 8px; border-radius: 4px; }
        .trend-down { color: var(--down); font-size: 10px; background: rgba(255, 59, 48, 0.1); padding: 2px 8px; border-radius: 4px; }

        .progress-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffd700, #ffae00); border-radius: 10px; transition: width 1.5s ease; }

        .val-total { font-weight: 800; color: var(--up); font-size: 16px; min-width: 130px; text-align: right; }

        .rank-item.top-1 { border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(255,215,0,0.05); }

        @media (max-width: 900px) {
            .top-grid { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; gap: 15px; border-radius: 20px; }
            .search-input { width: 100%; }
        }
    </style>
</head>
<body>

<div class="header">
    <h2>🏆 DASHBOARD <span>VENDAS</span></h2>
    <a href="index.html" class="btn-back">Sair do Sistema</a>
</div>

<div class="container">
    
    <div class="top-grid">
        <div class="glass-card">
            <div class="card-title">📈 Evolução de Vendas Semanal</div>
            <canvas id="salesChart" height="100"></canvas>
        </div>

        <div class="glass-card">
            <div class="card-title">🔥 Funil de Conversão</div>
            <div class="funnel-container" id="funnelData">
                <div class="funnel-step step-1" id="fLeads">LEADS: --</div>
                <div class="funnel-step step-2" id="fOps">OPORTUNIDADES: --</div>
                <div class="funnel-step step-3" id="fPropostas">PROPOSTAS: --</div>
                <div class="funnel-step step-4" id="fVendas">VENDAS: --</div>
            </div>
        </div>
    </div>

    <div class="filter-bar">
        <div class="cat-group">
            <div class="cat-btn active" onclick="setRanking('faturado', this)">💰 Geral</div>
            <div class="cat-btn" onclick="setRanking('acessorios', this)">📦 Acessórios</div>
            <div class="cat-btn" onclick="setRanking('aparelhos', this)">📱 Aparelhos</div>
            <div class="cat-btn" onclick="setRanking('audio', this)">🎧 Som</div>
            <div class="cat-btn" onclick="setRanking('protect', this)">🛡 Protect</div>
            <div class="cat-btn" onclick="loadFunilLojas(this)">🏠 Funil Lojas</div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar vendedor...">
        </div>
    </div>

    <div class="ranking-container" id="rankingList">
        </div>
</div>

<script>
let vendedoresRaw = [];
let metricasRaw = [];
let currentTipo = "faturado";
let mode = "vendedores";

const parseVal = v => !v ? 0 : Number(v.toString().replace(/[^\d,.-]/g,"").replace(/\./g,"").replace(",","."))
const formatMoeda = v => v.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})

fetch("https://opensheet.elk.sh/1Sz4W_66JfV1E0On0tOJAQmIXGvTd5IZ8Vdm1wTVxZfI/VENDEDORES_TOTAIS")
.then(r => r.json())
.then(data => {
    vendedoresRaw = data.map((item, index) => {
        const cSom = parseVal(item["CAIXA_SOM_VALOR"]);
        const cJbl = parseVal(item["CAIXA_JBL"]);
        return {
            nome: item["Nome Fantasia"],
            faturado: parseVal(item["FATURADO"]),
            acessorios: parseVal(item["ACESSORIOS_VALOR"]),
            aparelhos: parseVal(item["APARELHOS_VALOR"]),
            audio: cSom + cJbl,
            protect: parseVal(item["PROTECT_VALOR"]),
            prevPos: index + 1 
        }
    }).filter(v => v.faturado > 0);
    
    updateDisplay();
    initChart();
});

fetch("https://opensheet.elk.sh/1vMDMsdPbvzItkJyoSeGoDG40fhGZ1HUe3z7QgC0eZ4g/Métricas")
.then(r => r.json())
.then(data => {
    metricasRaw = data;
    const leads = data.reduce((acc, cur) => acc + parseVal(cur["DIRECIONADOS"]), 0);
    const vendas = data.reduce((acc, cur) => acc + parseVal(cur["REALIZADAS"]), 0);
    
    document.getElementById('fLeads').innerText = `LEADS: ${leads}`;
    document.getElementById('fVendas').innerText = `VENDAS: ${vendas}`;
    document.getElementById('fOps').innerText = `OPORTUNIDADES: ${Math.floor(leads * 0.4)}`;
    document.getElementById('fPropostas').innerText = `PROPOSTAS: ${Math.floor(leads * 0.2)}`;
});

function updateDisplay() {
    const list = document.getElementById("rankingList");
    list.innerHTML = "";
    
    let dados = mode === "vendedores" ? [...vendedoresRaw] : [...metricasRaw.map(m => ({nome: m["LOJAS_PDV"], faturado: parseVal(m["FATURADO"]), prevPos: 0}))];
    
    dados.sort((a,b) => (b[currentTipo] || 0) - (a[currentTipo] || 0));
    
    const maxVal = Math.max(...dados.map(d => d[currentTipo]), 1);

    dados.forEach((d, i) => {
        const pos = i + 1;
        const perc = (d[currentTipo] / maxVal) * 100;
        
        let trend = `<span class="trend-up">● ESTÁVEL</span>`;
        if(d.prevPos > 0) {
            if(pos < d.prevPos) trend = `<span class="trend-up">▲ SUBIU</span>`;
            else if(pos > d.prevPos) trend = `<span class="trend-down">▼ CAIU</span>`;
        }

        list.innerHTML += `
            <div class="rank-item ${pos === 1 ? 'top-1' : ''}">
                <div class="pos-badge">${pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos+'º'}</div>
                <div class="vendedor-info">
                    <div class="vendedor-name">${d.nome} ${trend}</div>
                    <div class="progress-bg">
                        <div class="progress-fill" style="width: ${perc}%"></div>
                    </div>
                </div>
                <div class="val-total">${formatMoeda(d[currentTipo])}</div>
            </div>
        `;
    });
}

function setRanking(tipo, btn) {
    currentTipo = tipo;
    mode = "vendedores";
    toggleActive(btn);
    updateDisplay();
}

function loadFunilLojas(btn) {
    mode = "funil";
    currentTipo = "faturado";
    toggleActive(btn);
    updateDisplay();
}

function toggleActive(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function initChart() {
    const ctx = document.getElementById('salesChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'],
            datasets: [{
                label: 'Volume de Vendas',
                data: [12000, 25000, 19000, 38000], 
                borderColor: '#FFD700',
                backgroundColor: 'rgba(255, 215, 0, 0.1)',
                fill: true,
                tension: 0.4,
                borderWidth: 3,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#666' } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false } }
            }
        }
    });
}

document.getElementById('searchInput').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    const items = document.querySelectorAll('.rank-item');
    items.forEach(item => {
        const name = item.querySelector('.vendedor-name').innerText.toLowerCase();
        item.style.display = name.includes(term) ? 'flex' : 'none';
    });
});
</script>
</body>
</html>
